            <div class="p-4 bg-slate-800 text-xs text-slate-400">

                    <button

                </div>
            </header>

        const menuConfig = [
            { id: 'authen', icon: 'fa-lock', label: 'Authentication' },
            { id: 'chat', icon: 'fa-comments', label: 'Chat System' },
            { id: 'profile', icon: 'fa-user-circle', label: 'User Profile' },
            { id: 'friend', icon: 'fa-user-friends', label: 'Friendship' }
        ];

        // KHỞI TẠO MENU
        function initMenu() {
            const menuNav = document.getElementById('sidebar-menu');
            menuConfig.forEach(item => {
                const a = document.createElement('a');
                a.href = "#";
                a.className = "sidebar-item flex items-center px-6 py-3 transition-all duration-200 text-slate-300 hover:text-white";
                a.innerHTML = `<i class="fas ${item.icon} mr-3 w-5 text-center"></i> ${item.label}`;
                a.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
                    a.classList.add('active');
                    renderFeature(item.id);
                };
                menuNav.appendChild(a);
            });
            // Mặc định load authen
            document.querySelector('.sidebar-item').click();
        }

        // RENDER NỘI DUNG TỪNG FEATURE
        function renderFeature(featureId) {
            const data = testData[featureId];
            document.getElementById('current-feature-title').innerText = data.title;
            document.getElementById('current-feature-desc').innerText = data.desc;

            // Render Stats
            document.getElementById('stats-container').innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 italic">
                    <div class="text-gray-400 text-xs font-bold uppercase mb-1">Total Cases</div>
                    <div class="text-3xl font-black">${data.stats.total}</div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="text-green-500 text-xs font-bold uppercase mb-1">Passed</div>
                    <div class="text-3xl font-black text-green-600">${data.stats.pass}</div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="text-red-500 text-xs font-bold uppercase mb-1">Failed</div>
                    <div class="text-3xl font-black text-red-600">${data.stats.fail}</div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="text-blue-500 text-xs font-bold uppercase mb-1">Total Time</div>
                    <div class="text-3xl font-black text-blue-600">${data.stats.time}</div>
                </div>
            `;

            // Render API List
            const listContainer = document.getElementById('api-list-container');
            listContainer.innerHTML = '';

            data.apis.forEach((api, index) => {
                const apiDiv = document.createElement('div');
                apiDiv.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden";

                const methodColor = api.method === 'POST' ? 'bg-green-100 text-green-700' :
                    api.method === 'GET' ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700';

                apiDiv.innerHTML = `
                    <button onclick="toggleAccordion('api-${index}')" class="w-full flex justify-between items-center p-5 hover:bg-gray-50 transition">
                        <div class="flex items-center gap-4">
                            <span class="${methodColor} text-[10px] font-black px-2 py-1 rounded-md">${api.method}</span>
                            <span class="font-mono text-sm font-semibold text-slate-700">${api.path}</span>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="flex gap-2">
                                <span class="h-2 w-2 rounded-full bg-green-500 mt-1.5"></span>
                                <span class="text-sm font-bold">${api.cases.filter(c => c.status === 'PASS').length}</span>
                                <span class="h-2 w-2 rounded-full bg-red-500 mt-1.5 ml-2"></span>
                                <span class="text-sm font-bold">${api.cases.filter(c => c.status === 'FAIL').length}</span>
                            </div>
                            <i class="fas fa-chevron-down text-gray-300"></i>
                        </div>
                    </button>
                    <div id="api-${index}" class="accordion-content border-t border-gray-100 bg-slate-50/50">
                        <div class="p-5">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="text-[11px] text-gray-400 uppercase tracking-widest border-b pb-2">
                                        <th class="pb-3 px-2">ID</th>
                                        <th class="pb-3">Assertion / Description</th>
                                        <th class="pb-3">Response</th>
                                        <th class="pb-3">Status</th>
                                        <th class="pb-3 text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${api.cases.map(c => `
                                        <tr class="text-sm border-b border-gray-100 last:border-0 hover:bg-white transition">
                                            <td class="py-4 px-2 font-mono text-xs text-gray-400">${c.id}</td>
                                            <td class="py-4 font-medium">${c.desc}</td>
                                            <td class="py-4 text-gray-500">${c.time}</td>
                                            <td class="py-4">
                                                <span class="${c.status === 'PASS' ? 'text-green-600' : 'text-red-600'} font-bold text-xs uppercase">
                                                    ${c.status}
                                                </span>
                                                ${c.error ? `<p class="text-[10px] text-red-400 mt-1 italic">${c.error}</p>` : ''}
                                            </td>
                                            <td class="py-4 text-right">
                                                <button class="text-blue-500 hover:text-blue-700 text-xs font-bold">VIEW LOG</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                listContainer.appendChild(apiDiv);
            });
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const isActive = content.classList.contains('active');
            // Close all
            document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('active'));
            // Toggle current
            if (!isActive) content.classList.add('active');
        }

        window.onload = initMenu;
